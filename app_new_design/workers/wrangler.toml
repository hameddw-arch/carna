name = "carna-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[env.production]
vars = { R2_ACCOUNT_ID = "", R2_PUBLIC_URL = "https://images.carna.online" }

[[env.production.r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "carna-images"

[env.development]
vars = { R2_ACCOUNT_ID = "", R2_PUBLIC_URL = "http://localhost:8787" }

[[env.development.r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "carna-images-preview"

[build]
command = "npm install && npm run build"
